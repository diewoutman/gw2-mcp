name: Build & Release

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: >
          dotnet publish Gw2Mcp.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          --output ./publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gw2-mcp-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract & bump version
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"

          # Extract version from release branch name (release/1.2.3 or release/v1.2.3)
          BRANCH_VERSION="${BRANCH#release/}"
          BRANCH_VERSION="${BRANCH_VERSION#v}"

          # Read current VersionPrefix from csproj
          CURRENT=$(grep -oP '<VersionPrefix>\K[^<]+' Gw2Mcp.csproj)
          echo "Current version: $CURRENT"
          echo "Branch version: $BRANCH_VERSION"

          # Use branch version if provided; otherwise bump patch
          if [ -n "$BRANCH_VERSION" ] && [ "$BRANCH_VERSION" != "$BRANCH" ]; then
            NEW_VERSION="$BRANCH_VERSION"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          fi

          echo "New version: $NEW_VERSION"

          # Update csproj
          sed -i "s|<VersionPrefix>$CURRENT</VersionPrefix>|<VersionPrefix>$NEW_VERSION</VersionPrefix>|" Gw2Mcp.csproj

          # Commit the version bump
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Gw2Mcp.csproj
          git commit -m "chore: bump version to $NEW_VERSION" || echo "No changes to commit"
          git push

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: false

      - name: Create release archives
        run: |
          mkdir -p ./release
          cd ./artifacts
          for dir in */; do
            rid="${dir%/}"
            if [ "$rid" = "win-x64" ] || [ "$rid" = "win-arm64" ]; then
              # Windows: zip
              cd "$rid"
              zip -r "../../release/gw2-mcp-${{ steps.version.outputs.version }}-${rid}.zip" .
              cd ..
            else
              # Unix: tar.gz
              cd "$rid"
              tar -czf "../../release/gw2-mcp-${{ steps.version.outputs.version }}-${rid}.tar.gz" .
              cd ..
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ./release/*